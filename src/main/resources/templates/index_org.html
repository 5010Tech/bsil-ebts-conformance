<!DOCTYPE html>
<html>
    <head>
        <title>Conformance Tool</title>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <link href="webjars/bootstrap/4.1.0/css/bootstrap.min.css" rel="stylesheet"/>
        <script src="webjars/jquery/3.3.1/jquery.min.js"></script>
        <script src="webjars/bootstrap/4.1.0/js/bootstrap.min.js"></script>
        <script src="webjars/dropzone/5.2.0/dropzone.js"></script>
        <link rel="stylesheet" href="css/SelectionScreen.css"/>

<!--        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.SPServices/2014.02/jquery.SPServices-2014.02.min.js"></script>

        <script src="js/SelectionScreen.js"></script>
    </head>
    <body>
<form action="result" method="POST" enctype="multipart/form-data">
        <div class="container">
            <div class="row text-center">
                <div class="col-12 text-center">
                    <h2>PM DoD Biometrics<br/>Night Vision &amp; Electronic Sensor Directorate<br/>Biometric Systems Interoperability Lab<br/>Conformance Tools</h2>
                </div>
            </div>
            <br/>
            <br/>
            <div class="row">
                
                <div class="col step"><h3 class="display-4">Step 1</h3></div>
                <div class="col-9">
                        <div class="upload-drop-zone" id="drop-zone">
                       </div> 
                   <span> 
                    <input type="file" id="file" name="file"/>
                    </span> 
                </div>
            </div>
            <hr/>
            <div class="row">
                <div class="col step"><h3 class="display-4">Step 2</h3></div>
                <div class="col-9 text-center">
                    <span> 
                        <select class="form-control" id="SpecSelection" name="spec"></select>   
                    </span>
                </div>
            </div>
            <hr/>
            <div class="row">
                <div class="col step"><h3 class="display-4">Step 3</h3></div>
                 <div class="col-9 align-left align-bottom">
                    <button type="submit" class="btn" id="postButton">Validate</button>
                 </div>                    
            </div>
               <div id="space" class="row text-center">
                   <br/>
               </div>
               
            <div class="row">
                <div id="loading" class="text-center col-12 startHidden">
                    <img src="images/35.svg"  alt="Loading..."/>
                </div>                
            </div>
        </div>      
    </form>
    </body>
